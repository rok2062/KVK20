:root{--bg:#0f1420;--panel:#1a2233;--panel2:#222c42;--ink:#e8ecf4;--muted:#9aa6bd;--line:#2c374f;--blue:#4d8bff;--green:#36c275;--red:#ff5a6a;--amber:#ffb020;--purple:#b06bff;--teal:#22c7d6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",Roboto,"Noto Sans JP",Meiryo,sans-serif;font-size:13px}
.topbar{background:linear-gradient(90deg,#1a2740,#2a1a40);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.topbar h1{font-size:17px;margin:0;font-weight:700}
.topbar .sub{font-size:12px;color:var(--muted)}
.badge{margin-left:auto;background:#0d1626;border:1px solid var(--line);padding:4px 11px;border-radius:14px;font-size:11px;color:var(--muted)}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.statusbar{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 14px;margin-bottom:12px;font-size:12px;color:var(--muted)}
.statusbar .dotc{width:9px;height:9px;border-radius:50%;background:#667;flex:none}
.statusbar.live .dotc{background:var(--green)} .statusbar.sample .dotc{background:var(--amber)} .statusbar.err .dotc{background:var(--red)}
.statusbar .reload{margin-left:auto;border:1px solid var(--line);background:#0d1626;color:var(--blue);border-radius:7px;padding:5px 12px;cursor:pointer;font-weight:600}
.setup{background:#2a2410;border:1px solid #5b4a16;border-radius:10px;padding:11px 15px;margin-bottom:12px;font-size:12px;line-height:1.7;color:#f0e3b8}
.setup code{background:#0d1626;border:1px solid #5b4a16;padding:1px 5px;border-radius:4px;color:#ffd970}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:none;padding:10px 20px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-weight:700;font-size:14px}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.page{display:none} .page.active{display:block}
.search{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#3a3410;border:2px solid var(--amber);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 0 0 3px rgba(255,176,32,.12)}
.srch-label{color:var(--amber);font-weight:800;align-self:center;font-size:14px}
.search input{flex:1;min-width:220px;padding:11px 14px;border-radius:8px;border:1px solid var(--amber);background:#1a1608;color:#fff;font-size:15px}
.search .clr{border:1px solid var(--line);background:#0d1626;color:var(--muted);border-radius:8px;padding:9px 14px;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.kpi .l{font-size:11px;color:var(--muted)} .kpi .v{font-size:22px;font-weight:800;margin-top:5px} .kpi .s{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.detail-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.detail-head .nm{font-size:22px;font-weight:800}
.detail-head .id{color:var(--muted);font-size:12px}
.pill{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:700}
.pill.main{background:#10331f;color:var(--green);border:1px solid #1c6b3f}
.norm{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px}
.normbox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px}
.normbox .t{font-size:12px;color:var(--muted);font-weight:700}
.normbox .big{font-size:26px;font-weight:800;margin:4px 0}
.bar{height:12px;background:#0d1626;border-radius:7px;overflow:hidden;margin:8px 0 4px}
.bar > i{display:block;height:100%;border-radius:7px}
.normbox .meta{font-size:11px;color:var(--muted)}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.sb{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px}
.sb .l{font-size:11px;color:var(--muted)} .sb .v{font-size:17px;font-weight:800;margin-top:3px}
.sb .r{font-size:10px;color:var(--muted);margin-top:2px}
.metricbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.mbtn{padding:9px 16px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-weight:700}
.mbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chart-box{position:relative;height:360px}
.tbl-wrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;background:#0d1626;color:var(--muted);text-align:right;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap;font-weight:700}
thead th:nth-child(1),thead th:nth-child(2){text-align:left}
tbody td{padding:8px 11px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
tbody td:nth-child(1),tbody td:nth-child(2){text-align:left}
tbody tr[data-id]:hover{background:#1f2a40;cursor:pointer}
.dirtbl thead th{cursor:pointer}
.rk{display:inline-block;min-width:26px;text-align:center;font-weight:800;border-radius:6px;padding:1px 6px}
.rk.g{background:#3a2f0c;color:var(--amber)}
.ok{color:var(--green)} .ng{color:var(--red)} .muted{color:var(--muted)}
.hint{font-size:11px;color:var(--muted);margin-top:8px}
.empty{color:var(--muted);text-align:center;padding:30px}

@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.norm{grid-template-columns:1fr}.statgrid{grid-template-columns:repeat(2,1fr)}}
</style>

function parseCSV(text){
  const rows=[]; let f='',row=[],q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
      else if(c==='\r'){} else f+=c; } }
  if(f!==''||row.length){row.push(f);rows.push(row);}
  return rows;
}
function conv(key,v){
  v=(v==null?'':String(v));
  if(STRK.has(key)) return v.trim();
  const t=v.replace(/,/g,'').replace('%','').trim();
  const n=Number(t);
  if(RANKK.has(key)) return (t===''||t==='-'||!isFinite(n))?null:n;
  if(!isFinite(n)) return 0;
  return n;
}
function csvToData(text){
  const arr=parseCSV(text), recs=[];
  for(const r of arr){
    if(!r || !/^\d{4,}$/.test(String(r[0]||'').trim())) continue;
    recs.push(COLS.map(k=>conv(k, r[IX[k]])));
  }
  if(!recs.length) throw new Error('no rows');
  return {cols:COLS, rows:recs};
}
function subsToData(text){
  const arr=parseCSV(text), rows=[];
  for(const r of arr){
    const sid=String(r[0]||'').trim(), mid=String(r[2]||'').trim();
    if(!/^\d{4,}$/.test(sid) || !/^\d{4,}$/.test(mid)) continue;
    rows.push([sid, String(r[1]||'').trim(), mid]);
  }
  return {cols:['subId','subName','mainId'], rows};
}
function rawToData(text){
  const arr=parseCSV(text), out=[];
  for(const r of arr){
    const id=String(r[0]||'').trim();
    if(!/^\d{4,}$/.test(id)) continue;
    const num=x=>Number(String(x==null?'':x).replace(/,/g,''))||0;
    const dead=num(r[4])+num(r[5])+num(r[6])+num(r[7])+num(r[8]);

}

      <thead><tr><th>区分</th><th>計</th><th>1st</th><th>2nd</th></tr></thead>

        <tr><td>⚔️ 撃破ポイント</td><td><b>${yen(g(r,'totalKP'))}</b></td><td>${yen(g(r,'firstKP'))}</td><td>${yen(g(r,'secondKP'))}</td></tr>
        <tr><td>\u{1F480} 戦死数</td><td><b>${yen(g(r,'totalDead'))}</b></td><td>${yen(g(r,'firstDead'))}</td><td>${yen(g(r,'secondDead'))}</td></tr>
      </tbody></table></div>`;
  const subs=SUBSMAP[String(g(r,'id'))]||[];
  let subsHtml='';
  if(subs.length){
    let totDead=0, joined=0;
    const rowsHtml=subs.map(s=>{
      const pr=PMAP[s.subId];
      const latest = pr? g(pr,'name') : s.subName;
      const dead = pr? g(pr,'totalDead') : null;
      const pw   = pr? g(pr,'startPower') : null;
      if(pr){joined++; totDead+=(dead||0);}
      return `<tr><td>${latest}${pr?'':' <span class="muted" style="font-size:10px">(登録名)</span>'}</td><td class="muted">${s.subId}</td><td>${pr?'<span class="ok">参加</span>':'<span class="muted">―</span>'}</td><td>${pw!=null?oku(pw):'-'}</td><td>${dead!=null?oku(dead):'-'}</td></tr>`;
    }).join('');
    subsHtml=`<h3 style="margin-top:18px">\u{1F465} サブアカウント（${subs.length}） <span class="muted" style="font-weight:400;font-size:12px">参加 ${joined} ／ サブ戦死合計 ${oku(totDead)}</span></h3><div class="tbl-wrap" style="max-height:300px"><table><thead><tr><th>サブ名(最新)</th><th>サブID</th><th>参加</th><th>戦力</th><th>戦死</th></tr></thead><tbody>${rowsHtml}</tbody></table></div><div class="hint">最新名はポータルのIDから取得。未参加は登録時の名前を表示。</div>`;
  } else {
    subsHtml=`<h3 style="margin-top:18px">\u{1F465} サブアカウント</h3><div class="hint">このメインに紐づくサブ登録はありません。</div>`;
  }
  det.innerHTML=`<div class="card"><div class="detail-head"><span class="nm">${g(r,'name')}</span><span class="id">ID: ${g(r,'id')}</span><span class="pill main">MAIN</span><span class="id">開始戦力 ${oku(g(r,'startPower'))} ／ 戦力上限 ${g(r,'powerCap')?oku(g(r,'powerCap')):'-'}</span></div>
    <div class="norm"><div class="normbox"><div class="t">⚔️ 撃破ノルマ達成率</div><div class="big" style="color:${kpColor}">${pct(kpN)}</div>${bars(kpN,Math.max(150,kpN),kpColor)}<div class="meta">獲得 ${yen(g(r,'totalKP'))} / 目標 ${yen(g(r,'targetKPinc'))}</div></div>
    <div class="normbox"><div class="t">\u{1F480} 戦死ノルマ達成率</div><div class="big" style="color:${g(r,'targetDeathCnt')>0?dColor:'var(--muted)'}">${g(r,'targetDeathCnt')>0?pct(dN):'対象外'}</div>${g(r,'targetDeathCnt')>0?bars(dN,Math.max(100,dN||1),dColor):''}<div class="meta">戦死 ${yen(g(r,'totalDead'))}（T5 ${yen(g(r,'totalDeadT5'))} / T4 ${yen(g(r,'totalDeadT4'))}）/ 目標 ${g(r,'targetDeathCnt')>0?yen(g(r,'targetDeathCnt')):'なし'}</div></div></div>
    <div class="statgrid"><div class="sb"><div class="l">貢献順位</div><div class="v">${g(r,'contribRank')??'-'} <span class="muted" style="font-size:12px">/ ${N}</span></div><div class="r">貢献Point ${oku(g(r,'contribPoint'))}</div></div>
    <div class="sb"><div class="l">撃破順位</div><div class="v">${g(r,'kpRank')??'-'} <span class="muted" style="font-size:12px">/ ${N}</span></div><div class="r">Total KP ${yen(g(r,'totalKP'))}</div></div>
    <div class="sb"><div class="l">戦死順位</div><div class="v">${g(r,'deadRank')??'-'} <span class="muted" style="font-size:12px">/ ${N}</span></div><div class="r">Total Dead ${yen(g(r,'totalDead'))}</div></div>
    <div class="sb"><div class="l">撃破ノルマ判定</div><div class="v">${kpN>=100?'達成':'未達'}</div><div class="r">${kpN>=100?'対象外':'未達ペナルティ対象'}</div></div></div>
    ${numHtml}
    <h3 style="margin-top:18px">\u{1F4C8} チェックポイント推移</h3><div class="chart-box" style="height:240px"><canvas id="cDetail"></canvas></div>
    ${subsHtml}</div>`;
  drawDetailChart(r);
}
function drawDetailChart(r){
  if(charts.cDetail)charts.cDetail.destroy();
  charts.cDetail=new Chart($('cDetail'),{type:'bar',
    data:{labels:['1st','2nd','合計'],datasets:[
      {label:'撃破ポイント',data:[g(r,'firstKP'),g(r,'secondKP'),g(r,'totalKP')],backgroundColor:'#4d8bff',borderRadius:4},
      {label:'戦死数',data:[g(r,'firstDead'),g(r,'secondDead'),g(r,'totalDead')],backgroundColor:'#ff5a6a',borderRadius:4,yAxisID:'y2'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9aa6bd'}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+yen(c.raw)}}},
      scales:{x:{ticks:{color:'#9aa6bd'},grid:{color:'#2c374f'}},
        y:{position:'left',ticks:{color:'#9aa6bd',callback:v=>oku(v)},grid:{color:'#2c374f'}},
        y2:{position:'right',ticks:{color:'#9aa6bd',callback:v=>oku(v)},grid:{drawOnChartArea:false}}}}});
}
function onSearch(){renderDir();renderDetail();}
const METRICS={
  contrib:{label:'貢献度Point',key:'contribPoint',color:'#b06bff',fmt:oku,isNorm:false},
  kp:{label:'撃破ポイント',key:'totalKP',color:'#4d8bff',fmt:oku,isNorm:false},
  dead:{label:'戦死数',key:'totalDead',color:'#ff5a6a',fmt:oku,isNorm:false},
  norm:{label:'ノルマ達成率',key:'kpNorm',color:'#36c275',fmt:pct,isNorm:true}
};
const SUBMETRICS={
  dead:{label:'戦死数',key:'totalDead',color:'#ff5a6a',fmt:oku,isNorm:false},
  kp:{label:'撃破ポイント',key:'totalKP',color:'#4d8bff',fmt:oku,isNorm:false}
};
function curSet(){return rankScope==='sub'?SUBMETRICS:METRICS;}
function curKey(){return rankScope==='sub'?subMetric:mainMetric;}
function curList(){return rankScope==='sub'?SUBONLY:MAIN;}
function renderKPIs(){
  const n=MAIN.length;
  const avgNorm=n?MAIN.reduce((a,r)=>a+(g(r,'kpNorm')||0),0)/n:0;
  const achieved=MAIN.filter(r=>g(r,'kpNorm')>=100).length;
  const items=[
    ['メイン / サブ', MAIN.length+' / '+SUBONLY.length,'対象人数'],
    ['撃破ノルマ平均', avgNorm.toFixed(1)+'%', achieved+' 名達成'],
    ['総撃破ポイント', oku(MAIN.reduce((a,r)=>a+(g(r,'totalKP')||0),0)),'メイン合計'],
    ['総戦死数', oku(ROWS.reduce((a,r)=>a+(g(r,'totalDead')||0),0)),'全体合計'],
  ];
  $('kpis').innerHTML=items.map(([l,v,s])=>`<div class="kpi"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`).join('');
}
function renderScopeBtns(){
  const scopes=[['main','メイン'],['sub','サブのみ']];
  $('scopebtns').innerHTML='<span class="muted" style="font-size:12px;margin-right:2px">対象:</span>'+scopes.map(([k,l])=>`<div class="mbtn ${k===rankScope?'active':''}" data-s="${k}">${l}（${k==='sub'?SUBONLY.length:MAIN.length}）</div>`).join('');
  $('scopebtns').querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{rankScope=b.dataset.s; renderRankTab();});
}
function renderMetricBtns(){
  const set=curSet(), cur=curKey();
  $('metricbtns').innerHTML='<span class="muted" style="font-size:12px;margin-right:2px">並び替え（クリック）:</span>'+Object.entries(set).map(([k,m])=>`<div class="mbtn ${k===cur?'active':''}" data-m="${k}">${m.label}順</div>`).join('');
  $('metricbtns').querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{if(rankScope==='sub')subMetric=b.dataset.m;else mainMetric=b.dataset.m;renderMetricBtns();renderRanking();});
}
function renderRanking(){
  const set=curSet(), m=set[curKey()], list=curList();
  const sorted=[...list].sort((a,b)=>(g(b,m.key)||0)-(g(a,m.key)||0));
  $('rankTitle').textContent=(rankScope==='sub'?'サブのみ ':'メイン ')+m.label+' TOP20';
  const top=sorted.slice(0,20);
  if(charts.cRank)charts.cRank.destroy();
  charts.cRank=new Chart($('cRank'),{type:'bar',
    data:{labels:top.map(r=>g(r,'name')),datasets:[{data:top.map(r=>g(r,m.key)||0),backgroundColor:m.color,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>m.fmt(c.raw)}}},
      scales:{x:{ticks:{color:'#9aa6bd',callback:v=>m.isNorm?v+'%':oku(v)},grid:{color:'#2c374f'}},
        y:{ticks:{color:'#9aa6bd',font:{size:11}},grid:{display:false}}}}});
  const th=$('rankTbl').querySelector('thead'), tb=$('rankTbl').querySelector('tbody');
  if(rankScope==='sub'){
    th.innerHTML='<tr><th>順位</th><th>名前</th><th>所属メイン</th><th>戦死</th><th>撃破P</th></tr>';
    tb.innerHTML=sorted.map((r,i)=>{const mid=SUB2MAIN[String(g(r,'id'))]; const mn=(mid&&PMAP[mid])?g(PMAP[mid],'name'):(mid||'-');
      return `<tr><td><span class="rk ${i<3?'g':''}">${i+1}</span></td><td>${g(r,'name')}</td><td class="muted">${mn}</td><td><b>${oku(g(r,'totalDead'))}</b></td><td>${oku(g(r,'totalKP'))}</td></tr>`;}).join('') || '<tr><td colspan="5" class="empty">サブのデータがありません（公開後に表示）</td></tr>';
    $('rankHint').textContent='※ サブアカウント（sub=Yes）のみ。並び替えは上のボタンで切替。';
  } else {
    th.innerHTML='<tr><th>順位</th><th>名前</th><th>'+m.label+'</th><th>撃破ノルマ</th><th>戦死</th><th>貢献P</th></tr>';
    tb.innerHTML=sorted.map((r,i)=>{const norm=g(r,'kpNorm');
      return `<tr data-id="${g(r,'id')}"><td><span class="rk ${i<3?'g':''}">${i+1}</span></td><td>${g(r,'name')}</td><td><b>${m.fmt(g(r,m.key))}</b></td><td class="${norm>=100?'ok':'ng'}">${pct(norm)}</td><td>${oku(g(r,'totalDead'))}</td><td>${oku(g(r,'contribPoint'))}</td></tr>`;}).join('');
    tb.querySelectorAll('tr[data-id]').forEach(tr=>tr.onclick=()=>{switchTab('search');$('q').value=tr.dataset.id;onSearch();});
    $('rankHint').textContent='※ 並び替えは上のボタンで切替。行クリックで個人ページへ。100%未満（赤）は撃破ノルマ未達。';
  }
  $('rankCount').textContent='（'+(rankScope==='sub'?'サブ '+SUBONLY.length:'メイン '+MAIN.length)+' 名）';
}
function renderRankTab(){renderKPIs();renderScopeBtns();renderMetricBtns();renderRanking();}
const CAMPMET={kp:{label:'撃破ポイント',key:'kp',color:'#4d8bff'},dead:{label:'戦死数',key:'dead',color:'#ff5a6a'}};
function campKingdoms(){return [...new Set(CAMPROWS.map(r=>r.kingdom).filter(Boolean))];}
function campPeriodsList(){return [...new Set(CAMPROWS.map(r=>r.period).filter(Boolean))];}
function renderCampPeriodBtns(){
  const ps=campPeriodsList(), el=$('campperiod');
  if(!ps.length){ el.innerHTML=''; campPeriod=''; return; }
  const order=['全期間','1st','2nd']; ps.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  if(!ps.includes(campPeriod)) campPeriod = ps.includes('全期間')?'全期間':ps[0];
  el.innerHTML='<span class="muted" style="font-size:12px;margin-right:2px">期間:</span>'+ps.map(p=>`<div class="mbtn ${p===campPeriod?'active':''}" data-p="${p}">${p}</div>`).join('');
  el.querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{campPeriod=b.dataset.p;renderCampPeriodBtns();renderCamp();});
}
function renderCampScopeBtns(){
  const ks=campKingdoms();
  const btns=[['all','全体（自国＋他国）']].concat(ks.map(k=>[k,k]));
  if(!btns.some(b=>b[0]===campScope)) campScope='all';
  $('campscope').innerHTML='<span class="muted" style="font-size:12px;margin-right:2px">王国:</span>'+btns.map(([v,l])=>`<div class="mbtn ${v===campScope?'active':''}" data-c="${v}">${l}</div>`).join('');
  $('campscope').querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{campScope=b.dataset.c;renderCampScopeBtns();renderCamp();});
}
function renderCampMetricBtns(){
  $('campmetric').innerHTML='<span class="muted" style="font-size:12px;margin-right:2px">並び替え（クリック）:</span>'+Object.entries(CAMPMET).map(([k,m])=>`<div class="mbtn ${k===campMetric?'active':''}" data-m="${k}">${m.label}順</div>`).join('');
  $('campmetric').querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{campMetric=b.dataset.m;renderCampMetricBtns();renderCamp();});
}
function renderCamp(){
  const m=CAMPMET[campMetric];
  let list=CAMPROWS; if(campPeriod) list=list.filter(r=>r.period===campPeriod); if(campScope!=='all') list=list.filter(r=>r.kingdom===campScope);
  const sorted=[...list].sort((a,b)=>(b[m.key]||0)-(a[m.key]||0));
  $('campTitle').textContent=(campPeriod?campPeriod+' / ':'')+(campScope==='all'?'全体（自国＋他国）':campScope)+' ／ '+m.label+' TOP20';
  const top=sorted.slice(0,20);
  if(charts.cCamp)charts.cCamp.destroy();
  charts.cCamp=new Chart($('cCamp'),{type:'bar',
    data:{labels:top.map(r=>r.name),datasets:[{data:top.map(r=>r[m.key]||0),backgroundColor:top.map(r=>/自国/.test(r.kingdom)?'#36c275':m.color),borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>oku(c.raw)+'（'+top[c.dataIndex].kingdom+'）'}}},
      scales:{x:{ticks:{color:'#9aa6bd',callback:v=>oku(v)},grid:{color:'#2c374f'}},y:{ticks:{color:'#9aa6bd',font:{size:11}},grid:{display:false}}}}});
  const th=$('campTbl').querySelector('thead'), tb=$('campTbl').querySelector('tbody');
  th.innerHTML='<tr><th>順位</th><th>名前</th><th>王国</th><th>撃破P</th><th>戦死</th></tr>';
  tb.innerHTML=sorted.map((r,i)=>{const self=/自国/.test(r.kingdom);
    const kpC=campMetric==='kp'?`<b>${oku(r.kp)}</b>`:oku(r.kp);
    const dC=campMetric==='dead'?`<b>${oku(r.dead)}</b>`:oku(r.dead);
    return `<tr data-id="${r.id}" data-k="${r.kingdom}"><td><span class="rk ${i<3?'g':''}">${i+1}</span></td><td>${r.name}</td><td class="${self?'ok':'muted'}">${r.kingdom}</td><td>${kpC}</td><td>${dC}</td></tr>`;}).join('') || '<tr><td colspan="5" class="empty">陣営データがありません（CSV設定後に表示）</td></tr>';
  tb.querySelectorAll('tr[data-id]').forEach(tr=>tr.onclick=()=>{campSel={id:tr.dataset.id,kingdom:tr.dataset.k};renderCampDetail();});
  $('campCount').textContent='（'+(campScope==='all'?'全'+campKingdoms().length+'王国':campScope)+' ・ '+sorted.length+'名）';
  $('campHint').textContent='※ 緑=自国。行をクリックするとその人の撃破・戦死を期間別グラフで表示。各王国の生スキャンを公開CSVにして設定すると自動追加。';
}
function renderCampDetail(){
  const el=$('campDetail');
  if(!campSel){ el.innerHTML=''; if(charts.cCampDetail){charts.cCampDetail.destroy();charts.cCampDetail=null;} return; }
  const rows=CAMPROWS.filter(r=>String(r.id)===String(campSel.id)&&r.kingdom===campSel.kingdom);
  if(!rows.length){ el.innerHTML=''; campSel=null; return; }
  const order=['全期間','1st','2nd'], byP={};
  rows.forEach(r=>byP[r.period||'全期間']=r);
  const labels=order.filter(p=>byP[p]);
  const r0=rows[0];
  const self=/自国/.test(r0.kingdom);
  el.innerHTML=`<div class="card"><div class="detail-head">
      <span class="nm">${r0.name}</span>
      <span class="id">ID: ${r0.id} ／ 王国 <span class="${self?'ok':'muted'}">${r0.kingdom}</span></span>
      <button onclick="campSel=null;renderCampDetail()" style="margin-left:auto;background:#0d1626;border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 12px;cursor:pointer">✕ 閉じる</button>
    </div>
    <div class="statgrid" style="margin-top:0;margin-bottom:12px">
      ${labels.map(p=>`<div class="sb"><div class="l">${p} 撃破P</div><div class="v" style="font-size:15px">${oku(byP[p].kp)}</div><div class="r">戦死 ${oku(byP[p].dead)}</div></div>`).join('')}
    </div>
    <div class="chart-box" style="height:240px"><canvas id="cCampDetail"></canvas></div></div>`;
  if(charts.cCampDetail)charts.cCampDetail.destroy();
  charts.cCampDetail=new Chart($('cCampDetail'),{type:'bar',
    data:{labels,datasets:[
      {label:'撃破ポイント',data:labels.map(p=>byP[p].kp),backgroundColor:'#4d8bff',borderRadius:4},
      {label:'戦死数',data:labels.map(p=>byP[p].dead),backgroundColor:'#ff5a6a',borderRadius:4,yAxisID:'y2'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9aa6bd'}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+yen(c.raw)}}},
      scales:{x:{ticks:{color:'#9aa6bd'},grid:{color:'#2c374f'}},
        y:{position:'left',ticks:{color:'#9aa6bd',callback:v=>oku(v)},grid:{color:'#2c374f'},title:{display:true,text:'撃破P',color:'#9aa6bd'}},
        y2:{position:'right',ticks:{color:'#9aa6bd',callback:v=>oku(v)},grid:{drawOnChartArea:false},title:{display:true,text:'戦死',color:'#9aa6bd'}}}}});
}
function renderCampTab(){renderCampPeriodBtns();renderCampScopeBtns();renderCampMetricBtns();renderCamp();renderCampDetail();}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('page-'+t).classList.add('active');
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
$('q').addEventListener('input',onSearch);
$('qClr').onclick=()=>{$('q').value='';onSearch();};
$('btnReload').onclick=loadData;
loadData();
</script>
</body>
</html>
